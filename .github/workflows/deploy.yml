name: Deploy to NCP (GHCR Build & Push)

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ./letzcollab-backend/gradlew

      - name: Run Backend Tests
        run: |
          cd letzcollab-backend
          ./gradlew test -Dspring.profiles.active=test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      repo_owner: peterkang98
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./letzcollab-backend
          push: true
          tags: ghcr.io/peterkang98/letzcollab/backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./letzcollab-frontend
          push: true
          tags: ghcr.io/peterkang98/letzcollab/frontend:latest


  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Config Files to NCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "docker-compose.prod.yml,nginx.conf"
          target: "/${{ secrets.USERNAME }}/letzcollab"

      - name: Execute Docker Compose on NCP
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            cd /${{ secrets.USERNAME }}/letzcollab
            
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            cat << 'EOF' > .env
            ${{ secrets.ENV_FILE }}
            EOF
            
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            
            docker image prune -f