services:
  db:
    image: postgres:17-alpine
    container_name: letzcollab-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  # 메일 테스트 서버
  mailhog:
    image: mailhog/mailhog:latest
    container_name: letzcollab-mailhog
    ports:
      - "1025:1025" # SMTP 서버 포트
      - "8025:8025" # 웹 UI 포트
    restart: always