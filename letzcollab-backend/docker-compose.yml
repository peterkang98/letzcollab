services:
  db:
    image: postgres:17-alpine
    container_name: letzcollab-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 메일 테스트 서버
  mailhog:
    image: mailhog/mailhog:latest
    container_name: letzcollab-mailhog
    ports:
      - "1025:1025" # SMTP 서버 포트
      - "8025:8025" # 웹 UI 포트
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: letzcollab-backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - JAVA_OPTS=-Xms512m -Xmx512m  # JVM 힙 메모리 제한
      - SPRING_DATASOURCE_URL=jdbc:postgresql://letzcollab-db:5432/letzcollab_db
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  prometheus:
    image: prom/prometheus:latest
    container_name: letzcollab-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  grafana:
    image: grafana/grafana:latest
    container_name: letzcollab-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  postgres_data:
  grafana_data: