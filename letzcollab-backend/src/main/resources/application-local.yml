spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/letzcollab_db
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  sql:
    init:
      mode: always
      data-locations: classpath:sql/seed.sql

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true

  mail:
    properties:
      mail:
        debug: true

cookie:
  secure: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always