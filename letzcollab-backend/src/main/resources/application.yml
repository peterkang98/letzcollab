spring:
  application:
    name: letzcollab-backend

  profiles:
    active: local

  messages:
    fallback-to-system-locale: false

  jpa:
    properties:
      hibernate:
        default_batch_fetch_size: 100

  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
          connectiontimeout: 3000
          timeout: 3000
          writetimeout: 3000

frontend:
  base-url: ${FRONTEND_BASE_URL:http://localhost:5173}

jwt:
  secret: ${JWT_ENC_KEY}
  access-validity-in-ms: ${JWT_ACCESS_EXP_TIME}

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha

server:
  servlet:
    context-path: /api
