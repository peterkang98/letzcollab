server {
    listen 80;
    server_name letzcollab.xyz www.letzcollab.xyz;

    # Certbot 인증용 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 첫 배포 시 certbot으로 SSL 인증서 발급 받고, 주석 해제 후 push
server {
    listen 443 ssl;
    server_name letzcollab.xyz www.letzcollab.xyz;

    ssl_certificate /etc/letsencrypt/live/letzcollab.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/letzcollab.xyz/privkey.pem;

    # 빌드된 리액트 앱 제공
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # 요청 경로에 파일이 없으면 무조건 index.html을 제공하도록 (리액트 라우터용)
        try_files $uri $uri/ /index.html;
    }

    # 스프링 부트 백엔드
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}