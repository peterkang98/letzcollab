services:
  db:
    image: postgres:17-alpine
    container_name: letzcollab-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: Asia/Seoul
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    command: [
      "postgres",
      # 디스크에서 자주 읽는 데이터를 메모리에 캐싱 (전체 DB 인스턴스가 공유)
      "-c", "shared_buffers=256MB",
      # 쿼리의 정렬이나 조인 연산을 위해 개별 연산 노드에 할당되는 메모리
      "-c", "work_mem=64MB",
      "-c", "effective_cache_size=1536MB"
    ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - letzcollab-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1536M

  backend:
    image: ghcr.io/peterkang98/letzcollab/backend:latest
    container_name: letzcollab-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      # secrets.ENV_FILE
      - .env
    environment:
      - TZ=Asia/Seoul
      - JAVA_OPTS=-Xms512m -Xmx512m
    networks:
      - letzcollab-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: letzcollab-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      TZ: Asia/Seoul
    networks:
      - letzcollab-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 300M

  frontend:
    image: ghcr.io/peterkang98/letzcollab/frontend:latest
    container_name: letzcollab-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL 증명서 참조
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      # nginx 설정 참조
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      TZ: Asia/Seoul
    depends_on:
      - backend
    networks:
      - letzcollab-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  mail:
    image: boky/postfix:latest
    container_name: letzcollab-mail
    restart: always
    environment:
      - TZ=Asia/Seoul
      - ALLOWED_SENDER_DOMAINS=mail.letzcollab.xyz
      - POSTFIX_mynetworks=127.0.0.0/8 172.18.0.0/16
      - POSTFIX_smtp_tls_security_level=may
      - POSTFIX_smtp_tls_loglevel=1
      # 인증서 경로
      - POSTFIX_smtpd_tls_cert_file=/etc/letsencrypt/live/letzcollab.xyz/fullchain.pem
      - POSTFIX_smtpd_tls_key_file=/etc/letsencrypt/live/letzcollab.xyz/privkey.pem
      - POSTFIX_smtpd_use_tls=yes
    volumes:
      # 호스트의 ./certbot/conf 폴더를 컨테이너의 /etc/letsencrypt로 연결
      - ./certbot/conf:/etc/letsencrypt:ro
    networks:
      - letzcollab-net

networks:
  letzcollab-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16