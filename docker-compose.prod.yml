services:
  db:
    image: postgres:17-alpine
    container_name: letzcollab-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - letzcollab-net

  backend:
    image: ghcr.io/peterkang98/letzcollab/backend:latest
    container_name: letzcollab-backend
    restart: always
    depends_on:
      - db
    env_file:
      # secrets.ENV_FILE
      - .env
    networks:
      - letzcollab-net

  frontend:
    image: ghcr.io/peterkang98/letzcollab/frontend:latest
    container_name: letzcollab-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL 증명서 참조
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      # nginx 설정 참조
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - letzcollab-net

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  mail:
    image: boky/postfix:latest
    container_name: letzcollab-mail
    restart: always
    environment:
      - ALLOWED_SENDER_DOMAINS=mail.letzcollab.xyz
      - POSTFIX_mynetworks=127.0.0.0/8 172.18.0.0/16
      - POSTFIX_smtp_tls_security_level=may
      - POSTFIX_smtp_tls_loglevel=1
      # 인증서 경로
      - POSTFIX_smtpd_tls_cert_file=/etc/letsencrypt/live/letzcollab.xyz/fullchain.pem
      - POSTFIX_smtpd_tls_key_file=/etc/letsencrypt/live/letzcollab.xyz/privkey.pem
      - POSTFIX_smtpd_use_tls=yes
    volumes:
      # 호스트의 ./certbot/conf 폴더를 컨테이너의 /etc/letsencrypt로 연결
      - ./certbot/conf:/etc/letsencrypt:ro
    networks:
      - letzcollab-net

networks:
  letzcollab-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16