services:
  db:
    image: postgres:17-alpine
    container_name: letzcollab-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: Asia/Seoul
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    command: [
      "postgres",
      # 디스크에서 자주 읽는 데이터를 메모리에 캐싱 (전체 DB 인스턴스가 공유)
      "-c", "shared_buffers=1GB",
      "-c", "effective_cache_size=3GB"
    ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - letzcollab-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 4G

  backend:
    image: ghcr.io/peterkang98/letzcollab/backend:latest
    container_name: letzcollab-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      # secrets.ENV_FILE
      - .env
    environment:
      - TZ=Asia/Seoul
      - JAVA_OPTS=-Xms2048m -Xmx2048m
    networks:
      - letzcollab-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 3G

  redis:
    image: redis:7-alpine
    container_name: letzcollab-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      TZ: Asia/Seoul
    networks:
      - letzcollab-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  frontend:
    image: ghcr.io/peterkang98/letzcollab/frontend:latest
    container_name: letzcollab-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL 증명서 참조
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      # nginx 설정 참조
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      TZ: Asia/Seoul
    depends_on:
      - backend
    networks:
      - letzcollab-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

networks:
  letzcollab-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16